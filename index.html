<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>立替精算管理システム｜株式会社フレックスデザイン</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Kaku Gothic ProN','Meiryo',sans-serif;font-size:14px;background:#f4f5f7;color:#222}
header{background:#1a3a5c;color:#fff;padding:14px 24px;display:flex;align-items:center;justify-content:space-between}
header h1{font-size:16px;font-weight:600;letter-spacing:.05em}
header span{font-size:12px;opacity:.7}
.nav{display:flex;background:#fff;border-bottom:1px solid #dde2ea}
.nav button{flex:1;padding:12px 8px;border:none;background:transparent;cursor:pointer;font-size:13px;color:#666;border-bottom:3px solid transparent}
.nav button.active{color:#1a3a5c;border-bottom-color:#1a3a5c;font-weight:600}
.nav button:hover:not(.active){background:#f4f5f7}
.page{display:none;padding:20px}
.page.active{display:block}
.form-card{background:#fff;border-radius:10px;padding:24px;border:1px solid #dde2ea;max-width:720px;margin:0 auto}
.form-card h2{font-size:15px;font-weight:600;margin-bottom:20px;padding-bottom:12px;border-bottom:2px solid #e8eaf0;color:#1a3a5c}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.form-row.full{grid-template-columns:1fr}
.form-group{display:flex;flex-direction:column;gap:6px}
label{font-size:12px;color:#555;font-weight:500}
.req{color:#c0392b;margin-left:2px}
input,select,textarea{padding:9px 11px;border:1px solid #ccd0d8;border-radius:6px;font-size:13px;font-family:inherit;background:#fff;color:#222}
input:focus,select:focus,textarea:focus{outline:none;border-color:#1a3a5c;box-shadow:0 0 0 3px rgba(26,58,92,.1)}
input[type=date]{cursor:pointer}
textarea{resize:vertical;min-height:72px}
.btn{padding:10px 22px;border-radius:6px;border:none;cursor:pointer;font-size:13px;font-weight:600}
.btn-primary{background:#1a3a5c;color:#fff}.btn-primary:hover{background:#14304d}
.btn-success{background:#1d9e75;color:#fff}.btn-success:hover{background:#178a64}
.btn-secondary{background:#f0f2f5;color:#444;border:1px solid #ccd0d8}.btn-secondary:hover{background:#e4e7ec}
.btn-danger{background:#c0392b;color:#fff}.btn-danger:hover{background:#a93226}
.btn-purple{background:#6f42c1;color:#fff}.btn-purple:hover{background:#5a32a3}
.btn-sm{padding:5px 12px;font-size:12px}
.form-footer{display:flex;justify-content:flex-end;gap:10px;margin-top:20px;padding-top:16px;border-top:1px solid #e8eaf0}
.amount-section{background:#f8f9fb;border-radius:8px;padding:16px;margin-bottom:16px}
.amount-section h3{font-size:12px;color:#888;margin-bottom:12px;font-weight:500}
.amount-row{display:grid;grid-template-columns:1fr 1fr 1fr 36px;gap:8px;align-items:end;margin-bottom:8px}
.amount-total{text-align:right;font-size:14px;font-weight:700;color:#1a3a5c;padding-top:10px;border-top:1px dashed #ccc}
.btn-icon{width:32px;height:32px;border-radius:6px;border:1px solid #ccd0d8;background:#fff;cursor:pointer;font-size:16px;color:#888;display:flex;align-items:center;justify-content:center}
.btn-icon:hover{background:#fee;border-color:#e74c3c;color:#e74c3c}
.list-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;gap:12px;flex-wrap:wrap}
.search-box{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.search-box input,.search-box select{padding:7px 10px;border:1px solid #ccd0d8;border-radius:6px;font-size:13px}
.table-wrap{overflow-x:auto;background:#fff;border-radius:10px;border:1px solid #dde2ea}
table{width:100%;border-collapse:collapse;min-width:600px}
thead tr{background:#f0f4f8}
th{padding:10px 12px;text-align:left;font-size:12px;color:#555;font-weight:600;border-bottom:1px solid #dde2ea;white-space:nowrap}
td{padding:10px 12px;font-size:13px;border-bottom:1px solid #f0f2f5;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafbfc}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.s-pending{background:#fff3cd;color:#856404}
.s-approved{background:#d4edda;color:#155724}
.s-paid{background:#cce5ff;color:#004085}
.s-received{background:#e2d9f3;color:#4a235a}
.action-btns{display:flex;gap:4px;flex-wrap:wrap}
.no-data{text-align:center;padding:40px;color:#aaa;font-size:13px}
.loading{text-align:center;padding:40px;color:#888;font-size:13px}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:20px}
.stat-card{background:#fff;border-radius:10px;padding:18px;border:1px solid #dde2ea;text-align:center}
.stat-label{font-size:11px;color:#888;margin-bottom:6px}
.stat-value{font-size:20px;font-weight:700;color:#1a3a5c}
.stat-value.amber{color:#b5740b}.stat-value.green{color:#1d9e75}.stat-value.blue{color:#1565c0}.stat-value.purple{color:#6f42c1}
.chart-section{background:#fff;border-radius:10px;padding:20px;border:1px solid #dde2ea}
.chart-section h3{font-size:13px;font-weight:600;color:#1a3a5c;margin-bottom:16px}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.bar-label{width:80px;font-size:12px;color:#666;text-align:right;flex-shrink:0}
.bar-bg{flex:1;background:#f0f2f5;border-radius:4px;height:22px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;display:flex;align-items:center;justify-content:flex-end;padding-right:8px}
.bar-val{font-size:11px;color:#fff;font-weight:600;white-space:nowrap}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:12px;padding:28px;width:92%;max-width:560px;max-height:90vh;overflow-y:auto}
.modal-lg{max-width:680px}
.modal h2{font-size:15px;font-weight:700;margin-bottom:16px;color:#1a3a5c}
.detail-row{display:flex;gap:8px;padding:8px 0;border-bottom:1px solid #f0f2f5;font-size:13px}
.detail-row:last-child{border-bottom:none}
.detail-key{width:110px;color:#888;flex-shrink:0;font-size:12px}
.detail-val{color:#222;font-weight:500;flex:1}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}
.alert{padding:10px 14px;border-radius:6px;font-size:13px;margin-bottom:12px}
.alert-success{background:#d4edda;color:#155724}
.alert-error{background:#f8d7da;color:#721c24}
.member-item{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f0f2f5;font-size:13px}
.cal-popup{display:none;position:fixed;z-index:200;background:#fff;border:1px solid #ccd0d8;border-radius:10px;padding:14px;box-shadow:0 4px 20px rgba(0,0,0,.15);width:280px;user-select:none}
.cal-popup.open{display:block}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-header span{font-size:14px;font-weight:600;color:#1a3a5c}
.cal-nav{background:none;border:1px solid #ccd0d8;border-radius:6px;width:28px;height:28px;cursor:pointer;font-size:16px;color:#555;display:flex;align-items:center;justify-content:center}
.cal-nav:hover{background:#f0f4f8}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-dow{text-align:center;font-size:11px;color:#999;padding:4px 0;font-weight:500}
.cal-day{text-align:center;font-size:13px;padding:5px 2px;border-radius:6px;cursor:pointer;color:#222;position:relative}
.cal-day:hover{background:#e8f0f8}
.cal-day.today{font-weight:700;color:#1a3a5c}
.cal-day.selected{background:#1a3a5c;color:#fff !important}
.cal-day.other-month{color:#ccc;cursor:default}
.cal-day.other-month:hover{background:none}
.cal-day.hol,.cal-day.sun{color:#c0392b}
.cal-day.sat{color:#1565c0}
.cal-tooltip{position:absolute;bottom:calc(100% + 4px);left:50%;transform:translateX(-50%);background:#333;color:#fff;font-size:10px;padding:3px 7px;border-radius:4px;white-space:nowrap;pointer-events:none;z-index:300}
.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) translateY(20px) rotate(-5deg);background:#1d9e75;color:#fff;font-size:18px;font-weight:700;padding:16px 36px;border-radius:12px;z-index:999;opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;white-space:nowrap;box-shadow:0 4px 24px rgba(0,0,0,.2)}
.toast.show{opacity:1;transform:translate(-50%,-50%) translateY(0) rotate(-5deg)}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid #ccc;border-top-color:#1a3a5c;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<header>
  <h1>立替精算管理システム</h1>
  <span>株式会社フレックスデザイン</span>
</header>
<div class="nav">
  <button id="nav-apply" class="active">新規申請</button>
  <button id="nav-list">申請一覧</button>
  <button id="nav-stats">集計レポート</button>
</div>

<!-- 新規申請 -->
<div id="page-apply" class="page active">
  <div class="form-card">
    <h2>立替精算申請フォーム</h2>
    <div id="form-alert"></div>
    <div class="form-row">
      <div class="form-group">
        <label>申請日<span class="req">*</span></label>
        <input type="date" id="f-date" readonly>
      </div>
      <div class="form-group">
        <label>申請者名<span class="req">*</span></label>
        <div style="display:flex;gap:6px">
          <select id="f-name" style="flex:1"></select>
          <button class="btn btn-secondary btn-sm" id="btn-open-member">＋ 追加</button>
        </div>
      </div>
    </div>
    <div class="amount-section">
      <h3>費用明細</h3>
      <div id="f-items"></div>
      <button class="btn btn-secondary btn-sm" id="btn-add-fitem" style="margin-top:8px">＋ 明細を追加</button>
      <div class="amount-total">合計金額：<span id="f-total">¥0</span></div>
    </div>
    <div class="form-row full">
      <div class="form-group">
        <label>備考</label>
        <textarea id="f-note" placeholder="支払い目的や特記事項があれば記入してください"></textarea>
      </div>
    </div>
    <div class="form-footer">
      <button class="btn btn-secondary" id="btn-reset">リセット</button>
      <button class="btn btn-primary" id="btn-submit">申請する</button>
    </div>
  </div>
</div>

<!-- 申請一覧 -->
<div id="page-list" class="page">
  <div class="list-header">
    <div class="search-box">
      <input type="text" id="s-text" placeholder="申請者で検索" style="width:180px">
      <select id="s-status">
        <option value="">すべてのステータス</option>
        <option value="未承認">未承認</option>
        <option value="承認済">承認済</option>
        <option value="精算">精算</option>
        <option value="受領">受領</option>
      </select>
    </div>
    <button class="btn btn-secondary btn-sm" id="btn-csv">CSVエクスポート</button>
  </div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>申請番号</th><th>申請日</th><th>申請者</th>
          <th>合計金額</th><th>ステータス</th><th>操作</th>
        </tr>
      </thead>
      <tbody id="list-body"></tbody>
    </table>
    <div id="no-data" class="no-data" style="display:none">データがありません</div>
    <div id="list-loading" class="loading"><span class="spinner"></span>読み込み中...</div>
  </div>
</div>

<!-- 集計レポート -->
<div id="page-stats" class="page">
  <div class="stats-grid" id="stats-grid"></div>
  <div class="chart-section">
    <h3>費用区分別・申請者別 集計</h3>
    <div id="chart-area"></div>
    <div style="margin-top:20px;text-align:right">
      <button class="btn btn-secondary btn-sm" id="btn-csv2">CSVエクスポート</button>
    </div>
  </div>
</div>

<!-- メンバー管理モーダル -->
<div class="modal-bg" id="modal-member">
  <div class="modal">
    <h2>申請者を管理</h2>
    <div class="form-row">
      <div class="form-group">
        <label>氏名<span class="req">*</span></label>
        <input type="text" id="m-name" placeholder="例：鈴木 一郎">
      </div>
      <div class="form-group">
        <label>メールアドレス</label>
        <input type="email" id="m-email" placeholder="例：suzuki@flex-design.co.jp">
      </div>
    </div>
    <div id="m-alert"></div>
    <button class="btn btn-primary btn-sm" id="btn-do-add-member" style="margin-bottom:16px">登録</button>
    <p style="font-size:12px;color:#888;margin-bottom:8px">登録済みメンバー</p>
    <div id="m-list"></div>
    <div class="modal-footer">
      <button class="btn btn-secondary" id="btn-close-member">閉じる</button>
    </div>
  </div>
</div>

<!-- 詳細モーダル -->
<div class="modal-bg" id="modal-detail">
  <div class="modal">
    <h2>申請詳細</h2>
    <div id="d-body"></div>
    <div class="modal-footer" id="d-footer"></div>
  </div>
</div>

<!-- 編集モーダル -->
<div class="modal-bg" id="modal-edit">
  <div class="modal modal-lg">
    <h2>申請内容を編集</h2>
    <div id="e-alert"></div>
    <div class="form-row">
      <div class="form-group">
        <label>申請日<span class="req">*</span></label>
        <input type="date" id="e-date" readonly>
      </div>
      <div class="form-group">
        <label>申請者名<span class="req">*</span></label>
        <select id="e-name" style="width:100%"></select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>ステータス</label>
        <select id="e-status">
          <option value="未承認">未承認</option>
          <option value="承認済">承認済</option>
          <option value="精算">精算</option>
          <option value="受領">受領</option>
        </select>
      </div>
      <div class="form-group"></div>
    </div>
    <div class="amount-section">
      <h3>費用明細</h3>
      <div id="e-items"></div>
      <button class="btn btn-secondary btn-sm" id="btn-add-eitem" style="margin-top:8px">＋ 明細を追加</button>
      <div class="amount-total">合計金額：<span id="e-total">¥0</span></div>
    </div>
    <div class="form-row full">
      <div class="form-group">
        <label>備考</label>
        <textarea id="e-note"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" id="btn-close-edit">キャンセル</button>
      <button class="btn btn-primary" id="btn-save-edit">保存する</button>
    </div>
  </div>
</div>

<!-- 受領書モーダル -->
<div class="modal-bg" id="modal-receipt">
  <div class="modal" style="max-width:420px">
    <div style="border:1px solid #ccd0d8;border-radius:8px;padding:28px 32px;background:#fff;font-family:'Hiragino Mincho ProN','Yu Mincho','Georgia',serif">
      <div style="text-align:center;font-size:20px;font-weight:700;letter-spacing:.2em;margin-bottom:24px;color:#1a3a5c">受　領　書</div>
      <div style="text-align:right;font-size:13px;color:#555;margin-bottom:20px" id="r-date"></div>
      <div style="border-bottom:2px solid #1a3a5c;padding-bottom:8px;margin-bottom:8px">
        <span style="font-size:13px;color:#888;display:block;text-align:left;margin-bottom:4px">金　額</span>
        <span style="font-size:28px;font-weight:700;color:#1a3a5c;letter-spacing:.05em;display:block;text-align:center" id="r-amount"></span>
      </div>
      <div style="border-top:1px solid #ccd0d8;padding-top:16px;margin-top:8px;font-size:13px;color:#444;line-height:2;text-align:center">
        以上の金額を現金で受領しました。
      </div>
      <div style="margin-top:24px;display:flex;align-items:center;justify-content:space-between;border-top:1px dashed #ccd0d8;padding-top:16px">
        <div style="font-size:13px;color:#888">申請者</div>
        <div style="display:flex;align-items:center;gap:12px">
          <span style="font-size:15px;font-weight:600;color:#222" id="r-name"></span>
          <button class="btn btn-primary btn-sm" id="btn-do-receive">受　領</button>
        </div>
      </div>
    </div>
    <div class="modal-footer" style="margin-top:16px">
      <button class="btn btn-secondary" id="btn-close-receipt">閉じる</button>
    </div>
  </div>
</div>

<!-- カレンダー -->
<div class="cal-popup" id="cal-popup">
  <div class="cal-header">
    <button class="cal-nav" id="cal-prev">&#8249;</button>
    <span id="cal-ym"></span>
    <button class="cal-nav" id="cal-next">&#8250;</button>
  </div>
  <div class="cal-grid" id="cal-grid"></div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ===== Supabase設定 ===== */
const SB_URL = 'https://twolywmokxggjnugzuig.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR3b2x5d21va3hnZ2pudWd6dWlnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1NDQ0MzksImV4cCI6MjA5MTEyMDQzOX0.fviTO35D3s3Rqz3VtTVcXdlgESjiO9yz4PRvsxGHVCI';
const HEADS  = {'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY};

async function sbGet(table, params=''){
  const res = await fetch(`${SB_URL}/rest/v1/${table}?${params}`, {headers:{...HEADS,'Prefer':'return=representation'}});
  if(!res.ok) throw new Error(await res.text());
  return res.json();
}
async function sbPost(table, body){
  const res = await fetch(`${SB_URL}/rest/v1/${table}`, {method:'POST', headers:{...HEADS,'Prefer':'return=representation'}, body:JSON.stringify(body)});
  if(!res.ok) throw new Error(await res.text());
  return res.json();
}
async function sbPatch(table, params, body){
  const res = await fetch(`${SB_URL}/rest/v1/${table}?${params}`, {method:'PATCH', headers:{...HEADS,'Prefer':'return=representation'}, body:JSON.stringify(body)});
  if(!res.ok) throw new Error(await res.text());
  return res.json();
}
async function sbDelete(table, params){
  const res = await fetch(`${SB_URL}/rest/v1/${table}?${params}`, {method:'DELETE', headers:HEADS});
  if(!res.ok) throw new Error(await res.text());
}

/* ===== 定数・状態 ===== */
const CATS=['交通費','宿泊費','飲食費','消耗品費','工具・資材費','通信費','その他'];
let members=[], records=[], fSeq=0, eSeq=0, editId=null;

const fmt$ = n => '¥'+Number(n).toLocaleString();
const fmtD = s => s?s.replace(/-/g,'/'):'';
const scls  = s => ({未承認:'s-pending',承認済:'s-approved',精算:'s-paid',受領:'s-received'}[s]||'s-pending');
const mkBtn = (cls,txt,fn) => { const b=document.createElement('button'); b.className=`btn ${cls}`; b.textContent=txt; b.addEventListener('click',fn); return b; };

/* ===== トースト ===== */
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

/* ===== 祝日 ===== */
const HOLIDAYS=(()=>{
  const fixed={'01-01':'元日','02-11':'建国記念の日','02-23':'天皇誕生日','04-29':'昭和の日','05-03':'憲法記念日','05-04':'みどりの日','05-05':'こどもの日','08-11':'山の日','11-03':'文化の日','11-23':'勤労感謝の日'};
  const cache={};
  function build(y){
    const h={};
    const add=(m,d,n)=>{h[`${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`]=n;};
    const dow=(m,d)=>new Date(y,m-1,d).getDay();
    Object.entries(fixed).forEach(([md,n])=>{const[m,d]=md.split('-').map(Number);add(m,d,n);if(dow(m,d)===0)add(m,d+1,n+'（振替）');});
    const sp=Math.floor(20.8431+0.242194*(y-1980)-Math.floor((y-1980)/4));add(3,sp,'春分の日');if(dow(3,sp)===0)add(3,sp+1,'春分（振替）');
    const au=Math.floor(23.2488+0.242194*(y-1980)-Math.floor((y-1980)/4));add(9,au,'秋分の日');if(dow(9,au)===0)add(9,au+1,'秋分（振替）');
    let c=0;for(let d=1;d<=31;d++){if(dow(7,d)===1){c++;if(c===3){add(7,d,'海の日');break;}}}
    c=0;for(let d=1;d<=30;d++){if(dow(9,d)===1){c++;if(c===3){add(9,d,'敬老の日');break;}}}
    c=0;for(let d=1;d<=31;d++){if(dow(10,d)===1){c++;if(c===2){add(10,d,'スポーツの日');break;}}}
    return h;
  }
  return{get:y=>{if(!cache[y])cache[y]=build(y);return cache[y];}};
})();

let calTarget=null,calY=0,calM=0;
const calPopup=document.getElementById('cal-popup');
const DOWS=['日','月','火','水','木','金','土'];
function calRender(){
  document.getElementById('cal-ym').textContent=`${calY}年${calM+1}月`;
  const grid=document.getElementById('cal-grid');
  grid.innerHTML=DOWS.map(d=>`<div class="cal-dow">${d}</div>`).join('');
  const first=new Date(calY,calM,1).getDay(), last=new Date(calY,calM+1,0).getDate(), prevL=new Date(calY,calM,0).getDate();
  const sel=calTarget?calTarget.value:'', today=new Date(), hols=HOLIDAYS.get(calY);
  for(let i=0;i<first;i++) grid.innerHTML+=`<div class="cal-day other-month">${prevL-first+1+i}</div>`;
  for(let d=1;d<=last;d++){
    const ds=`${calY}-${String(calM+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dw=(first+d-1)%7, isTod=today.getFullYear()===calY&&today.getMonth()===calM&&today.getDate()===d, isSel=sel===ds, hol=hols[ds];
    const cls=['cal-day',dw===0||hol?'hol':'',dw===6?'sat':'',isTod?'today':'',isSel?'selected':''].filter(Boolean).join(' ');
    grid.innerHTML+=`<div class="${cls}" data-date="${ds}"${hol?` data-hol="${hol}"`:''}>${d}</div>`;
  }
  for(let d=1;d<=42-first-last;d++) grid.innerHTML+=`<div class="cal-day other-month">${d}</div>`;
  grid.querySelectorAll('[data-date]').forEach(el=>{
    el.addEventListener('click',()=>{ if(calTarget){calTarget.value=el.dataset.date;calTarget.dispatchEvent(new Event('input',{bubbles:true}));} calClose(); });
    if(el.dataset.hol){
      el.addEventListener('mouseenter',()=>{const t=document.createElement('div');t.className='cal-tooltip';t.textContent=el.dataset.hol;el.appendChild(t);});
      el.addEventListener('mouseleave',()=>el.querySelectorAll('.cal-tooltip').forEach(t=>t.remove()));
    }
  });
}
function calOpen(input){ calTarget=input; const v=input.value?new Date(input.value):new Date(); calY=v.getFullYear();calM=v.getMonth(); const r=input.getBoundingClientRect(); calPopup.style.top=(r.bottom+window.scrollY+4)+'px'; calPopup.style.left=Math.min(r.left,window.innerWidth-290)+'px'; calPopup.classList.add('open'); calRender(); }
function calClose(){ calPopup.classList.remove('open'); calTarget=null; }
document.getElementById('cal-prev').addEventListener('click',e=>{e.stopPropagation();calM--;if(calM<0){calM=11;calY--;}calRender();});
document.getElementById('cal-next').addEventListener('click',e=>{e.stopPropagation();calM++;if(calM>11){calM=0;calY++;}calRender();});
document.addEventListener('click',e=>{if(!calPopup.contains(e.target)&&e.target!==calTarget)calClose();});
function hookDates(){ document.querySelectorAll('input[type=date]').forEach(el=>{ if(el.dataset.ch)return; el.dataset.ch='1'; el.addEventListener('click',e=>{e.stopPropagation();calOpen(el);}); }); }

async function genId(){
  const rows=await sbGet('expenses','select=id&order=applied_at.desc&limit=1');
  if(!rows.length) return 'R-0001';
  const last=parseInt(rows[0].id.replace('R-',''))||0;

}

async function submitForm(){

async function loadRecords(){
  document.getElementById('list-loading').style.display='block';

  try{
    const exps=await sbGet('expenses','order=id.desc');

    const items=ids?await sbGet('expense_items',`expense_id=in.(${ids})&order=expense_id`):[];
    records=exps.map(e=>({...e,items:items.filter(i=>i.expense_id===e.id).map(i=>({cat:i.category,date:i.item_date,amt:i.amount}))}));
  }catch(e){ console.error(e); }

    wrap.appendChild(mkBtn('btn-secondary btn-sm','編集',()=>showEdit(r.id)));
    wrap.appendChild(mkBtn('btn-danger btn-sm','削除',()=>delRecord(r.id)));

  ].map(s=>`<div class="stat-card"><div class="stat-label">${s.label}</div><div class="stat-value ${s.cls}">${s.val}</div></div>`).join('');
  const catT={},nameT={};
  records.forEach(r=>{r.items.forEach(i=>{catT[i.cat]=(catT[i.cat]||0)+i.amt;});nameT[r.member_name]=(nameT[r.member_name]||0)+r.total;});
  const bar=(obj,color)=>{const ents=Object.entries(obj).sort((a,b)=>b[1]-a[1]);const mx=Math.max(1,...Object.values(obj));return ents.map(([k,v])=>`<div class="bar-row"><span class="bar-label">${k}</span><div class="bar-bg"><div class="bar-fill" style="width:${Math.round(v/mx*100)}%;background:${color}"><span class="bar-val">${fmt$(v)}</span></div></div></div>`).join('')||'<p style="color:#aaa;font-size:13px">データなし</p>';};
  document.getElementById('chart-area').innerHTML=`<p style="font-size:12px;color:#888;margin-bottom:10px">費用区分別</p>${bar(catT,'#1a3a5c')}<p style="font-size:12px;color:#888;margin:16px 0 10px">申請者別</p>${bar(nameT,'#1d9e75')}`;
}

/* ===== CSV ===== */
document.getElementById('btn-csv').addEventListener('click',exportCSV);
document.getElementById('btn-csv2').addEventListener('click',exportCSV);
document.getElementById('s-text').addEventListener('input',renderList);
document.getElementById('s-status').addEventListener('change',renderList);

function exportCSV(){
  if(!records.length){alert('データがありません');return;}
  const hd=['申請番号','申請日','申請者名','費用区分','支出日','金額（円）','合計金額（円）','ステータス','備考'];
  const rows=[];
  records.forEach(r=>{
    (r.items&&r.items.length?r.items:[{}]).forEach((it,i)=>{
      rows.push([r.id,r.applied_date,r.member_name,it.cat||'',it.date||'',it.amt||'',i===0?r.total:'',i===0?r.status:'',i===0?(r.note||''):''].map(v=>{v=String(v??'');return(v.includes(',')||v.includes('"'))?'"'+v.replace(/"/g,'""')+'"':v;}));
    });
  });
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob(['\uFEFF',[hd,...rows].map(r=>r.join(',')).join('\n')],{type:'text/csv;charset=utf-8'}));
  a.download='立替精算_'+new Date().toISOString().slice(0,10)+'.csv';a.click();
}

function showAlert(id,msg,type){ document.getElementById(id).innerHTML=`<div class="alert alert-${type}">${msg}</div>`; }
